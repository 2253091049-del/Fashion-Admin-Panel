kind = "web"
previewPath = "/"
title = "SD Fashion Dashboard"
version = "1.0.0"
id = "artifacts/sd-fashion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23496

[services.development]
run = "pnpm --filter @workspace/sd-fashion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sd-fashion", "run", "build" ]
publicDir = "artifacts/sd-fashion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23496"
BASE_PATH = "/"
